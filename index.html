<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>콘택트렌즈 제품 스펙 검색</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <h1>ACUVUE<sup>®</sup> 렌즈 스펙 검색</h1>
    <p class="sub">제품명 / 타입 검색</p>

    <div class="searchRow">
      <input id="q" class="search" placeholder="예: 오아시스 / 난시 / 멀티" />
      <button id="btnSearch" class="btnPrimary">확인</button>
      <button id="btnClear" class="btn">초기화</button>
    </div>

    <div class="filters">
      <select id="type">
        <option value="">타입(전체)</option>
        <option value="구면">구면</option>
        <option value="난시">난시</option>
        <option value="멀티">멀티</option>
        <option value="컬러">컬러</option>
      </select>

      <select id="period">
        <option value="">주기(전체)</option>
        <option value="원데이">원데이</option>
        <option value="2주">2주</option>
        <option value="한달용">한달용</option>
      </select>
    </div>

    <div id="count" class="count"></div>
  </header>

  <main class="main">
    <section id="list" class="grid"></section>

    <section id="detail" class="detail hidden">
      <div class="detail-head">
        <h2 id="d-title"></h2>
        <button id="d-close" class="btn">닫기</button>
      </div>
      <table class="spec">
        <tbody id="d-table"></tbody>
      </table>
    </section>
  <footer class="footer-note">
    안경사 교육용 자료입니다. 무단 복제 및 배포를 금합니다. KR_2026_315
  </main>

  <script src="app.js"></script>
</body>
</html>
