<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>아큐브 렌즈 스펙 검색</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <h1>아큐브 렌즈 스펙 검색</h1>
    <p class="sub">제품명 / 재질 / 타입 / 도수 범위 검색</p>

    <div class="searchRow">
      <input id="q" class="search" placeholder="예: 오아시스 / 모이스트 / 난시 / 멀티 / senofilcon" />
      <button id="btnSearch" class="btnPrimary">확인</button>
      <button id="btnClear" class="btn">초기화</button>
    </div>

    <div class="filters">
      <select id="type">
        <option value="">타입(전체)</option>
        <option>원데이</option>
        <option>2주</option>
        <option>구면</option>
        <option>난시</option>
        <option>멀티</option>
      </select>
    </div>

    <div id="count" class="count"></div>
  </header>

  <main class="main">
    <section id="list" class="grid"></section>

    <section id="detail" class="detail hidden">
      <div class="detail-head">
        <h2 id="d-title"></h2>
        <a id="d-link" target="_blank" rel="noreferrer">공식 페이지</a>
        <button id="d-close" class="btn">닫기</button>
      </div>
      <table class="spec">
        <tbody id="d-table"></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
